name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            client_artifact: onyx-linux-x86_64
            server_artifact: onyx-server-linux-x86_64
            use_cross: false
            build_server: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            client_artifact: onyx-linux-arm64
            server_artifact: onyx-server-linux-arm64
            use_cross: true
            build_server: true

          - target: aarch64-apple-darwin
            os: macos-14
            client_artifact: onyx-macos-arm64
            server_artifact: ""
            use_cross: false
            build_server: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (Linux arm64)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: |
          if [ "${{ matrix.build_server }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p client -p server
          else
            cross build --release --target ${{ matrix.target }} -p client
          fi

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: |
          if [ "${{ matrix.build_server }}" = "true" ]; then
            cargo build --release --target ${{ matrix.target }} -p client -p server
          else
            cargo build --release --target ${{ matrix.target }} -p client
          fi

      - name: Stage client binary
        run: |
          cp target/${{ matrix.target }}/release/onyx ${{ matrix.client_artifact }}
          chmod +x ${{ matrix.client_artifact }}

      - name: Stage server binary
        if: matrix.server_artifact != ''
        run: |
          cp target/${{ matrix.target }}/release/onyx-server ${{ matrix.server_artifact }}
          chmod +x ${{ matrix.server_artifact }}

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client_artifact }}
          path: ${{ matrix.client_artifact }}

      - name: Upload server artifact
        if: matrix.server_artifact != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server_artifact }}
          path: ${{ matrix.server_artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      macos_arm64_sha256: ${{ steps.checksums.outputs.macos_arm64_sha256 }}
      server_x86_64_sha256: ${{ steps.checksums.outputs.server_x86_64_sha256 }}
      server_arm64_sha256: ${{ steps.checksums.outputs.server_arm64_sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        id: checksums
        run: |
          cd artifacts
          sha256sum onyx-* > onyx-sha256sums.txt
          macos_sha=$(awk '$2 == "onyx-macos-arm64" {print $1}' onyx-sha256sums.txt)
          if [ -z "$macos_sha" ]; then
            echo "::error::onyx-macos-arm64 checksum not found"
            exit 1
          fi
          server_x86_sha=$(awk '$2 == "onyx-server-linux-x86_64" {print $1}' onyx-sha256sums.txt)
          server_arm_sha=$(awk '$2 == "onyx-server-linux-arm64" {print $1}' onyx-sha256sums.txt)
          if [ -z "$server_x86_sha" ] || [ -z "$server_arm_sha" ]; then
            echo "::error::server companion checksums not found"
            exit 1
          fi
          echo "macos_arm64_sha256=$macos_sha" >> "$GITHUB_OUTPUT"
          echo "server_x86_64_sha256=$server_x86_sha" >> "$GITHUB_OUTPUT"
          echo "server_arm64_sha256=$server_arm_sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            **Linux x86_64**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/onyx-linux-x86_64 -o onyx && chmod +x onyx && sudo mv onyx /usr/local/bin/
            ```

            **Linux arm64**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/onyx-linux-arm64 -o onyx && chmod +x onyx && sudo mv onyx /usr/local/bin/
            ```

            **macOS (Apple Silicon)**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/onyx-macos-arm64 -o onyx && chmod +x onyx && sudo mv onyx /usr/local/bin/
            ```

            Or use the one-liner install script:
            ```bash
            curl -fsSL https://useonyx.dev/install.sh | sh
            ```

  bump-homebrew-formula:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: shervin9/homebrew-onyx
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          TAG: ${{ github.ref_name }}
          CLIENT_SHA256: ${{ needs.release.outputs.macos_arm64_sha256 }}
          SERVER_X86_SHA256: ${{ needs.release.outputs.server_x86_64_sha256 }}
          SERVER_ARM_SHA256: ${{ needs.release.outputs.server_arm64_sha256 }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          if [ -z "$CLIENT_SHA256" ] || [ -z "$SERVER_X86_SHA256" ] || [ -z "$SERVER_ARM_SHA256" ]; then
            echo "::error::missing formula checksums from release job"
            exit 1
          fi
          cp source/Formula/onyx.rb tap/Formula/onyx.rb
          cd tap
          sed -i -E "s|^([[:space:]]*)version \"[^\"]*\"|\\1version \"${VERSION}\"|" Formula/onyx.rb
          awk -v client="$CLIENT_SHA256" -v x86="$SERVER_X86_SHA256" -v arm="$SERVER_ARM_SHA256" '
            /sha256 "/ {
              n++
              if (n == 1) sub(/sha256 "[a-f0-9]+"/, "sha256 \"" client "\"")
              if (n == 2) sub(/sha256 "[a-f0-9]+"/, "sha256 \"" x86 "\"")
              if (n == 3) sub(/sha256 "[a-f0-9]+"/, "sha256 \"" arm "\"")
            }
            { print }
          ' Formula/onyx.rb > Formula/onyx.rb.tmp
          mv Formula/onyx.rb.tmp Formula/onyx.rb
          grep -E "^[[:space:]]*version \"${VERSION}\"$" Formula/onyx.rb
          grep -E "^[[:space:]]*sha256 \"${CLIENT_SHA256}\"$" Formula/onyx.rb
          grep -E "^[[:space:]]*sha256 \"${SERVER_X86_SHA256}\"$" Formula/onyx.rb
          grep -E "^[[:space:]]*sha256 \"${SERVER_ARM_SHA256}\"$" Formula/onyx.rb
          grep -E "libexec.install \"onyx-server-linux-x86_64\"" Formula/onyx.rb
          grep -E "libexec.install \"onyx-server-linux-arm64\"" Formula/onyx.rb

      - name: Commit and push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd tap
          git config user.name "onyx-release-bot"
          git config user.email "release-bot@useonyx.dev"
          if git diff --quiet -- Formula/onyx.rb; then
            echo "Formula already up to date for ${TAG}"
            exit 0
          fi
          git add Formula/onyx.rb
          git commit -m "onyx ${TAG}: bump formula"
          git push

      - name: Trigger tap validation
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh api \
            --method POST \
            repos/shervin9/homebrew-onyx/dispatches \
            -f event_type=onyx-formula-bumped \
            -f client_payload[version]="${TAG}" || echo "dispatch failed (non-fatal; push-based workflow will still run)"
